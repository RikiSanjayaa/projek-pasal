services:
  postgres:
    image: postgres:16-alpine
    container_name: caripasal-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: caripasal
      POSTGRES_USER: caripasal_user
      POSTGRES_PASSWORD: caripasal_local_password
    ports:
      - "55432:5432"
    volumes:
      - caripasal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caripasal_user -d caripasal"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  caripasal_postgres_data:
