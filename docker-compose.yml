services:
  admin-dashboard:
    container_name: caripasal-admin-dashboard-local
    build:
      context: ./admin-dashboard
    restart: unless-stopped
    ports:
      - "${ADMIN_DASHBOARD_PORT}:80"
    depends_on: [backend]

  mobile-web:
    container_name: caripasal-mobile-web-local
    build:
      context: ./pasal_mobile_app
      args:
        FLUTTER_BUILD_IMAGE: ${FLUTTER_BUILD_IMAGE}
    restart: unless-stopped
    ports:
      - "${MOBILE_WEB_PORT}:80"
    depends_on: [backend]

  backend:
    container_name: caripasal-backend-local
    build:
      context: ./backend-laravel
    env_file:
      - path: ./backend-laravel/.env.docker
        required: false
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: caripasal-postgres-local
    restart: unless-stopped
    env_file:
      - path: ./backend-laravel/.env.docker
        required: false
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - caripasal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: caripasal-mailpit-local
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT}:8025"

volumes:
  caripasal_postgres_data:
